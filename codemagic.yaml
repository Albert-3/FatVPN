workflows:
  ios-unsigned:
    name: iOS build (unsigned validation)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          cd app
          flutter pub get
      - name: Pod install
        script: |
          cd app/ios
          pod install
      - name: Build unsigned iOS
        script: |
          cd app
          flutter build ios --debug --no-codesign
    artifacts:
      - app/build/ios/iphoneos/*.app
